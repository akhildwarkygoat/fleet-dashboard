<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Previously used route — live ERP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <style>
    :root { --bg:#eef2f7; --surface:#fff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --faint:#94a3b8;
      --primary:#6366f1; --primarySoft:#eef2ff; --good:#10b981; --watch:#f59e0b; --poor:#f43f5e; --gainup:#c2410c; --techno:#047857; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    #cockpit { position: relative; height: 100%; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
    #cockpit:fullscreen { border-radius: 0; border: 0; }
    #map { position: absolute; inset: 0; background: #f8fafc; }
    /* Apple "liquid glass" */
    .glass { background: rgba(255,255,255,0.62); backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55); box-shadow: 0 8px 30px rgba(15,23,42,.20), inset 0 1px 1px rgba(255,255,255,0.75), inset 0 -1px 2px rgba(255,255,255,0.35); }
    .gbtn { position: absolute; z-index: 600; border-radius: 10px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
      color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
    /* KPI strip */
    #kpi { position: absolute; z-index: 600; top: 16px; left: 60px; border-radius: 16px; padding: 10px 12px; transition: right .15s; }
    #kpi .hint { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    #kpi .hint .eye { margin-left: auto; cursor: pointer; }
    #tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .tile { position: relative; overflow: hidden; border-radius: 12px; padding: 6px 10px; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6); min-width: 110px; }
    .tile .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .tile .lab { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding-left: 6px; }
    .tile .val { font-size: 20px; font-weight: 800; line-height: 1.05; padding-left: 6px; color: var(--text); }
    .tile .sub { font-size: 9px; color: var(--muted); padding-left: 6px; }
    /* buses panel */
    #buses { position: absolute; z-index: 600; top: 16px; right: 16px; bottom: 16px; width: 300px; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    #buses .bhead { display: flex; align-items: center; justify-content: space-between; padding: 12px 12px 8px; }
    #buses .bhead .ttl { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    #buses .bhead .rt { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    #buses .search { margin: 0 12px 8px; padding: 8px 10px; border-radius: 10px; font-size: 13px; outline: none; border: 1px solid var(--border); background: rgba(255,255,255,0.6); }
    #buslist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; padding: 0 12px 12px; }
    .bcard { text-align: left; border-radius: 12px; padding: 9px 10px; cursor: pointer; background: rgba(255,255,255,0.5); border: 1.5px solid rgba(255,255,255,0.6); transition: box-shadow .1s; }
    .bcard.on { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primarySoft); background: var(--primarySoft); }
    .bcard .bhdr { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .bcard .bdot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .bcard .bnm { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bcard .track { height: 4px; border-radius: 3px; overflow: hidden; background: rgba(15,23,42,0.08); margin-bottom: 5px; }
    .bcard .fill { height: 100%; border-radius: 3px; }
    .bcard .brow { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--muted); }
    .num { font-variant-numeric: tabular-nums; font-weight: 700; }
    .icobtn { background: none; border: 0; cursor: pointer; color: var(--muted); padding: 2px; display: inline-flex; }
    /* leaflet popup edit form */
    .pop label { font-size: 11px; color: var(--muted); display: block; margin: 6px 0 2px; }
    .pop input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
    .pop .save, .pop .see { margin-top: 8px; border: 0; border-radius: 8px; padding: 6px 10px; font-weight: 700; cursor: pointer; width: 100%; }
    .pop .save { background: var(--primary); color: #fff; }
    .pop .see { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 6px; }
    .pop .emps { max-height: 150px; overflow-y: auto; font-size: 12px; }
    .pop .emps div { padding: 3px 0; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div id="cockpit">
    <div id="map"></div>

    <!-- Fullscreen + Export stacked at the bottom-left, clear of the KPI strip -->
    <button class="gbtn glass" id="full" style="bottom:16px;left:16px"></button>
    <button class="gbtn glass" id="export" style="bottom:56px;left:16px"></button>

    <!-- restore chips when panels are hidden -->
    <button class="gbtn glass" id="showKpi" style="top:60px;left:60px;display:none"></button>
    <button class="gbtn glass" id="showBuses" style="top:16px;right:16px;display:none"></button>

    <!-- KPI glass strip -->
    <div id="kpi" class="glass">
      <div class="hint"><span id="hicon"></span><span id="hinttext">Click a stop to edit it or see its employees, or click a bus to trace its route.</span>
        <span class="eye icobtn" id="hideKpi" title="Hide stats"></span></div>
      <div id="tiles"></div>
    </div>

    <!-- YOUR BUSES glass panel -->
    <div id="buses" class="glass">
      <div class="bhead"><span class="ttl">Your buses</span>
        <span class="rt"><span id="buscount"></span><button class="icobtn" id="hideBuses" title="Hide"></button></span></div>
      <input class="search" id="search" placeholder="Find a bus…" />
      <div id="buslist"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const DEPOT = [10.207550, 77.806206];
    const PAL = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16',
      '#06b6d4','#a855f7','#e11d48','#22c55e','#eab308','#3b82f6','#d946ef','#0891b2','#65a30d','#dc2626'];
    const EKEY = 'erpRouteEdits';
    const edits = JSON.parse(localStorage.getItem(EKEY) || '{}');
    const map = L.map('map', { zoomControl: true }).setView(DEPOT, 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

    function stopDot(color, hc, on) {
      const size = on ? 30 : 22, ring = on ? `box-shadow:0 0 0 3px #fff,0 0 0 5px ${color};` : 'box-shadow:0 1px 3px rgba(0,0,0,.35);';
      return L.divIcon({ className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2],
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;${ring}display:flex;align-items:center;justify-content:center;color:#fff;font:700 ${on ? 12 : 10}px/1 Inter,system-ui">${hc}</div>` });
    }
    function factoryPin() {
      return L.divIcon({ className: '', iconSize: [40, 50], iconAnchor: [20, 50],
        html: '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="50" viewBox="0 0 46 58"><path d="M23 57 C12 41 2.5 33.5 2.5 21 A20.5 20.5 0 1 1 43.5 21 C43.5 33.5 34 41 23 57 Z" fill="#0f172a" stroke="#fff" stroke-width="2.5"/><g transform="translate(11 9)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></g></svg>' });
    }
    function makeCluster(cluster) {
      const total = cluster.getAllChildMarkers().reduce((s, m) => s + (m.options.headcount || 0), 0);
      const size = total < 25 ? 36 : total < 100 ? 44 : total < 300 ? 52 : 62, fs = total >= 1000 ? 11 : total >= 100 ? 12.5 : 13.5;
      return L.divIcon({ className: '', iconSize: [size, size],
        html: `<div style="width:${size}px;height:${size}px;position:relative"><div style="position:absolute;inset:0;border-radius:50%;background:#6366f1;opacity:.2"></div><div style="position:absolute;inset:7px;border-radius:50%;background:#6366f1;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:700 ${fs}px/1 Inter,system-ui">${total}</div></div>` });
    }
    const cluster = L.markerClusterGroup({ showCoverageOnHover: false, maxClusterRadius: 60, iconCreateFunction: makeCluster }).addTo(map);
    const polyLayer = L.layerGroup().addTo(map);
    L.marker(DEPOT, { icon: factoryPin(), zIndexOffset: 1000 }).bindTooltip('FACTORY (depot)', { direction: 'top', offset: [0, -44] }).addTo(map);

    let buses = [], sel = [], q = '';
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const editId = (bn, s) => `${bn}|${s.lat},${s.lng}`;
    const utilOf = b => b.seat ? (b.riders / b.seat) * 100 : 0;
    const pct = n => Math.round(n) + '%';
    const fillCol = u => u > 150 ? 'var(--watch)' : u >= 90 ? 'var(--good)' : u >= 60 ? 'var(--watch)' : 'var(--poor)';
    // lucide-style inline icons (matches the Optimiser/Planner tab — no emojis)
    const IC = {
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
      max: '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/>',
      min: '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/>',
      eyeoff: '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>',
      bar: '<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
      bus: '<path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.8-1.7.8-2.8c0-1-.3-2-.8-2.9l-1.9-4.6A2 2 0 0 0 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/>',
      pointer: '<path d="m9 9 5 12 1.8-5.2L21 14Z"/><path d="M7.2 2.2 8 5.1"/><path d="m5.1 8-2.9-.8"/><path d="M14 4.1 12 6"/><path d="m6 12-1.9 2"/>',
      chevR: '<path d="m9 18 6-6-6-6"/>', chevD: '<path d="m6 9 6 6 6-6"/>',
    };
    const svg = (n, s = 14) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;vertical-align:-2px">${IC[n]}</svg>`;

    (async () => {
      let d;
      try { const r = await fetch('/current_routes.full.json'); if (r.ok) d = await r.json(); } catch (e) {}
      if (!d) d = await (await fetch('/current_routes.json')).json();
      buses = d.buses;
      buses.forEach(b => b.stops.forEach(s => { const e = edits[editId(b.name, s)]; if (e) { if (e.name != null) s.name = e.name; if (e.hc != null) s.hc = e.hc; } }));
      const owned = buses.filter(b => b.type !== 'rental').length, seats = buses.reduce((s, b) => s + (b.seat || 0), 0);
      document.getElementById('tiles').innerHTML = [
        ['Buses', d.meta.vehicles, `${owned} own · ${d.meta.vehicles - owned} rent`, 'var(--primary)'],
        ['Riders', d.meta.riders.toLocaleString(), `${d.meta.riders_placed.toLocaleString()} placed`, 'var(--good)'],
        ['Utilisation', pct(seats ? d.meta.riders / seats * 100 : 0), `${seats.toLocaleString()} seats`, 'var(--watch)'],
        ['Stops', d.meta.stops.toLocaleString(), `${(d.meta.stops / d.meta.vehicles).toFixed(0)} avg/bus`, 'var(--gainup)'],
      ].map(([l, v, s, c]) => `<div class="tile"><span class="bar" style="background:${c}"></span><div class="lab">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`).join('');

      buses.forEach((b, bi) => {
        const col = PAL[bi % PAL.length]; b._col = col;
        b._poly = (b.path && b.path.length > 1) ? b.path : [DEPOT, ...b.stops.map(s => [s.lat, s.lng])];
        b.stops.forEach((s, si) => {
          const mk = L.marker([s.lat, s.lng], { icon: stopDot(col, s.hc, false), headcount: s.hc });
          mk.bindTooltip(`<div style="font:600 12px/1.35 Inter,system-ui"><b>${esc(s.name)}</b><br><span style="color:${col};font-weight:700">${esc(b.name)}</span> · ${s.hc} riders</div>`, { direction: 'top', offset: [0, -12] });
          mk.bindPopup(() => popupHtml(bi, si));
          s._marker = mk; s._col = col;
        });
      });
      renderBuses(); applyMap();
    })();

    function renderBuses() {
      let list = buses.map((b, i) => ({ b, i })).filter(x => !q || x.b.name.toLowerCase().includes(q) || (x.b.unit || '').toLowerCase().includes(q));
      list.sort((a, b) => (sel.includes(b.i) - sel.includes(a.i)) || (b.b.n_stops - a.b.n_stops));
      const used = buses.filter(b => b.n_stops > 0).length;
      document.getElementById('buscount').textContent = (sel.length ? sel.length + ' sel · ' : '') + `${used}/${buses.length}`;
      document.getElementById('buslist').innerHTML = list.map(({ b, i }) => {
        const u = utilOf(b), on = sel.includes(i);
        return `<button class="bcard ${on ? 'on' : ''}" onclick="toggleBus(${i})" title="${esc(b.name)} — ${b.n_stops} stops, ${b.km || '?'} km, ${b.trip || '?'} min">
          <div class="bhdr"><span class="bdot" style="background:${b._col}"></span><span class="bnm">${esc(b.name)}</span></div>
          <div class="track"><div class="fill" style="width:${Math.min(100, u)}%;background:${fillCol(u)}"></div></div>
          <div class="brow"><span>${b.type === 'rental' ? 'rent' : 'own'} · ${b.seat || '?'}</span><span class="num">${b.riders}/${b.seat || '?'}</span></div>
        </button>`;
      }).join('');
      document.getElementById('export').innerHTML = svg('download') + (sel.length ? ` Export (${sel.length})` : ' Export');
    }
    function toggleBus(i) {
      const k = sel.indexOf(i); if (k >= 0) sel.splice(k, 1); else sel.push(i);
      applyMap(); renderBuses();
    }
    function applyMap() {
      // show only the selected routes' stops (all stops when nothing is selected), like the Planner
      cluster.clearLayers(); polyLayer.clearLayers();
      const idxs = sel.length ? sel : buses.map((_, i) => i);
      const batch = [];
      idxs.forEach(i => buses[i].stops.forEach(s => { if (s._marker) batch.push(s._marker); }));
      cluster.addLayers(batch);
      sel.forEach(i => { const b = buses[i]; if (b._poly && b._poly.length > 1) L.polyline(b._poly, { color: b._col, weight: 4, opacity: .95 }).addTo(polyLayer); });
      if (sel.length) { const pts = sel.flatMap(i => [DEPOT, ...buses[i].stops.map(s => [s.lat, s.lng])]); if (pts.length > 1) map.fitBounds(pts, { padding: [60, 60] }); }
    }

    /* stop popup: edit + collapsible employees */
    function popupHtml(bi, si) {
      const b = buses[bi], s = b.stops[si];
      return `<div class="pop"><div style="font-size:11px;color:#64748b">Bus <b>${esc(b.name)}</b> · stop ${s.order} of ${b.n_stops}</div>
        <label>Stop name</label><input id="ed-name" value="${esc(s.name)}" />
        <label>Headcount</label><input id="ed-hc" type="number" min="0" value="${s.hc}" />
        <button class="save" onclick="saveStop(${bi},${si})">Save</button>
        <button class="see" id="see-btn" onclick="toggleEmps(${bi},${si})">${svg('chevR', 12)} See employees (${s.hc})</button>
        <div class="emps" id="emp-list"></div></div>`;
    }
    function toggleEmps(bi, si) {
      const s = buses[bi].stops[si], el = document.getElementById('emp-list'), btn = document.getElementById('see-btn');
      if (el.innerHTML) { el.innerHTML = ''; btn.innerHTML = svg('chevR', 12) + ` See employees (${s.hc})`; return; }
      if (s.members && s.members.length) el.innerHTML = s.members.map(m => `<div><b>${esc(m.name || '—')}</b>${m.village ? ' · <span style="color:#64748b">' + esc(m.village) + '</span>' : ''}</div>`).join('');
      else el.innerHTML = `<div style="color:#64748b">${s.hc} employee(s) mapped here · names hidden on the public link</div>`;
      btn.innerHTML = svg('chevD', 12) + ` Hide employees (${s.hc})`;
    }
    function saveStop(bi, si) {
      const b = buses[bi], s = b.stops[si];
      const nm = document.getElementById('ed-name').value.trim(), hc = Math.max(0, parseInt(document.getElementById('ed-hc').value) || 0);
      s.name = nm || s.name; s.hc = hc;
      edits[editId(b.name, s)] = { name: s.name, hc: s.hc }; localStorage.setItem(EKEY, JSON.stringify(edits));
      if (s._marker) { s._marker.setIcon(stopDot(s._col, hc, false)); s._marker.options.headcount = hc; s._marker.setPopupContent(popupHtml(bi, si)); if (cluster.refreshClusters) cluster.refreshClusters(s._marker); }
    }

    /* export (selection-aware) */
    function exportXlsx() {
      const use = sel.length ? sel.map(i => buses[i]) : buses;
      const hasNames = buses.some(b => b.stops.some(s => s.members && s.members.length));
      const rows = [], header = hasNames ? ['Stop','Latitude','Longitude','Bus','Headcount','Village','Employee'] : ['Stop','Latitude','Longitude','Bus','Headcount'];
      if (hasNames) use.forEach(b => b.stops.forEach(s => (s.members || []).forEach(m => rows.push({ Stop: s.name, Latitude: s.lat, Longitude: s.lng, Bus: b.name, Headcount: s.hc, Village: m.village || '', Employee: m.name || '' }))));
      else use.forEach(b => b.stops.forEach(s => rows.push({ Stop: s.name, Latitude: s.lat, Longitude: s.lng, Bus: b.name, Headcount: s.hc })));
      const ws = XLSX.utils.json_to_sheet(rows, { header });
      ws['!cols'] = header.map(h => ({ wch: h === 'Employee' ? 24 : h === 'Stop' || h === 'Village' ? 20 : 12 }));
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Stops'); XLSX.writeFile(wb, 'previously_used_routes.xlsx');
    }

    /* controls: fullscreen, panel toggles, search, export */
    // set lucide icons (no emojis)
    document.getElementById('full').innerHTML = svg('max') + ' Fullscreen';
    document.getElementById('showKpi').innerHTML = svg('bar') + ' Stats';
    document.getElementById('showBuses').innerHTML = svg('bus') + ' Buses';
    document.getElementById('hideKpi').innerHTML = svg('eyeoff');
    document.getElementById('hideBuses').innerHTML = svg('eyeoff');
    document.getElementById('hicon').innerHTML = svg('pointer', 13);

    document.getElementById('search').oninput = e => { q = e.target.value.trim().toLowerCase(); renderBuses(); };
    document.getElementById('export').onclick = exportXlsx;
    const cockpit = document.getElementById('cockpit');
    document.getElementById('full').onclick = () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else cockpit.requestFullscreen && cockpit.requestFullscreen();
    };
    document.addEventListener('fullscreenchange', () => {
      const b = document.getElementById('full'); b.innerHTML = document.fullscreenElement ? svg('min') + ' Exit fullscreen' : svg('max') + ' Fullscreen';
      setTimeout(() => map.invalidateSize(), 60);
    });
    const kpi = document.getElementById('kpi'), busesPanel = document.getElementById('buses');
    const relayoutKpi = () => { kpi.style.right = (busesPanel.style.display === 'none' ? 16 : 332) + 'px'; };
    document.getElementById('hideKpi').onclick = () => { kpi.style.display = 'none'; document.getElementById('showKpi').style.display = 'inline-flex'; };
    document.getElementById('showKpi').onclick = () => { kpi.style.display = 'block'; document.getElementById('showKpi').style.display = 'none'; };
    document.getElementById('hideBuses').onclick = () => { busesPanel.style.display = 'none'; document.getElementById('showBuses').style.display = 'inline-flex'; relayoutKpi(); };
    document.getElementById('showBuses').onclick = () => { busesPanel.style.display = 'flex'; document.getElementById('showBuses').style.display = 'none'; relayoutKpi(); };
    relayoutKpi();
    setTimeout(() => map.invalidateSize(), 80);
  </script>
</body>
</html>
