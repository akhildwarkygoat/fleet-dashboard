<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Previously used route — live ERP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <style>
    :root { --bg:#eef2f7; --surface:#fff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --faint:#94a3b8;
      --primary:#6366f1; --primarySoft:#eef2ff; --good:#10b981; --watch:#f59e0b; --poor:#f43f5e; --gainup:#c2410c; --techno:#047857; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    #cockpit { position: relative; height: 100%; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
    #cockpit:fullscreen { border-radius: 0; border: 0; }
    #map { position: absolute; inset: 0; background: #f8fafc; }
    /* Apple "liquid glass" */
    .glass { background: rgba(255,255,255,0.62); backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55); box-shadow: 0 8px 30px rgba(15,23,42,.20), inset 0 1px 1px rgba(255,255,255,0.75), inset 0 -1px 2px rgba(255,255,255,0.35); }
    /* Zoom control (+/−) — align to the same 16px inset as the KPI strip / Export / Fullscreen */
    .leaflet-top .leaflet-control { margin-top: 16px !important; }
    .leaflet-left .leaflet-control { margin-left: 16px !important; }
    /* Zoom control (+/−) — same liquid glass as the buttons/panels above */
    .leaflet-control-zoom.leaflet-bar {
      border: 1px solid rgba(255,255,255,0.55) !important; border-radius: 12px !important; overflow: hidden;
      box-shadow: 0 8px 30px rgba(15,23,42,.20), inset 0 1px 1px rgba(255,255,255,0.75), inset 0 -1px 2px rgba(255,255,255,0.35) !important;
    }
    .leaflet-control-zoom a {
      width: 32px !important; height: 32px !important; line-height: 32px !important; font-size: 18px; font-weight: 700;
      color: var(--text) !important; background: rgba(255,255,255,0.62) !important;
      backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 0 !important; border-bottom: 1px solid rgba(255,255,255,0.5) !important; transition: background .15s ease;
    }
    .leaflet-control-zoom a:last-child { border-bottom: 0 !important; }
    .leaflet-control-zoom a:hover { background: rgba(255,255,255,0.82) !important; color: var(--text) !important; }
    .leaflet-control-zoom a.leaflet-disabled { opacity: .45; }
    .gbtn { position: absolute; z-index: 600; border-radius: 10px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
      color: var(--text); display: inline-flex; align-items: center; gap: 6px; }
    /* KPI strip */
    #kpi { position: absolute; z-index: 600; top: 16px; left: 60px; border-radius: 16px; padding: 10px 12px; transition: right .15s; }
    #kpi .hint { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    #kpi .hint .eye { margin-left: auto; cursor: pointer; }
    #tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .tile { position: relative; overflow: hidden; border-radius: 12px; padding: 6px 10px; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6); min-width: 110px; }
    .tile .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .tile .lab { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding-left: 6px; }
    .tile .val { font-size: 20px; font-weight: 800; line-height: 1.05; padding-left: 6px; color: var(--text); }
    .tile .sub { font-size: 9px; color: var(--muted); padding-left: 6px; }
    /* buses panel */
    #buses { position: absolute; z-index: 600; top: 16px; right: 16px; bottom: 16px; width: 300px; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
    #buses .bhead { display: flex; align-items: center; justify-content: space-between; padding: 12px 12px 8px; }
    #buses .bhead .ttl { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    #buses .bhead .rt { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    #buses .search { margin: 0 12px 8px; padding: 8px 10px; border-radius: 10px; font-size: 13px; outline: none; border: 1px solid var(--border); background: rgba(255,255,255,0.6); }
    #buslist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; padding: 0 12px 12px; }
    .bcard { text-align: left; border-radius: 12px; padding: 9px 10px; cursor: pointer; background: rgba(255,255,255,0.5); border: 1.5px solid rgba(255,255,255,0.6); transition: box-shadow .1s; }
    .bcard.on { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primarySoft); background: var(--primarySoft); }
    .bcard .bhdr { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .bcard .bdot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .bcard .bnm { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bcard .track { height: 4px; border-radius: 3px; overflow: hidden; background: rgba(15,23,42,0.08); margin-bottom: 5px; }
    .bcard .fill { height: 100%; border-radius: 3px; }
    .bcard .brow { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--muted); }
    .num { font-variant-numeric: tabular-nums; font-weight: 700; }
    .icobtn { background: none; border: 0; cursor: pointer; color: var(--muted); padding: 2px; display: inline-flex; }
    /* leaflet popup edit form */
    .pop label { font-size: 11px; color: var(--muted); display: block; margin: 6px 0 2px; }
    .pop input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
    .pop .save, .pop .see { margin-top: 8px; border: 0; border-radius: 8px; padding: 6px 10px; font-weight: 700; cursor: pointer; width: 100%; }
    .pop .save { background: var(--primary); color: #fff; }
    .pop .see { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 6px; }
    .pop .emps { max-height: 150px; overflow-y: auto; font-size: 12px; }
    .pop .emps div { padding: 3px 0; border-top: 1px solid var(--border); }
    /* ── Rebuild loading overlay (Prev-route refreshes from live ERP on load) ── */
    #loader { position: absolute; inset: 0; z-index: 1200; display: none; align-items: center; justify-content: center;
      background: rgba(238,242,247,0.55); backdrop-filter: blur(7px) saturate(120%); -webkit-backdrop-filter: blur(7px) saturate(120%); }
    #loader.on { display: flex; animation: loaderIn .3s ease both; }
    @keyframes loaderIn { from { opacity: 0 } to { opacity: 1 } }
    #loader .card { width: min(400px, 86%); border-radius: 20px; padding: 28px 26px 22px; text-align: center; }
    #loader .route { width: 116px; height: 116px; display: block; margin: 0 auto 8px; }
    #loader .route .track { stroke: rgba(99,102,241,.16); }
    #loader .route .draw { stroke: var(--primary); stroke-linecap: round; stroke-dasharray: 235; stroke-dashoffset: 235; animation: drawRoute 2.1s ease-in-out infinite; }
    @keyframes drawRoute { 0% { stroke-dashoffset: 235 } 55% { stroke-dashoffset: 0 } 100% { stroke-dashoffset: -235 } }
    #loader .ttl { font-size: 16px; font-weight: 800; color: var(--text); margin-top: 2px; letter-spacing: -.01em; }
    #loader .msg { font-size: 12.5px; color: var(--muted); margin-top: 5px; min-height: 16px; font-variant-numeric: tabular-nums; }
    #loader .bar { height: 7px; border-radius: 6px; background: rgba(15,23,42,.09); overflow: hidden; margin-top: 18px; }
    #loader .bar > i { display: block; height: 100%; width: 0; border-radius: 6px; background: linear-gradient(90deg, var(--primary), #8b5cf6); transition: width .5s cubic-bezier(.4,0,.2,1); }
    #loader .hint2 { font-size: 10.5px; color: var(--faint); margin-top: 11px; }
    /* ── Sub-tab toggle (Route map / Merge review) — bottom-center, clear of panels ── */
    #subtab { position: absolute; z-index: 620; bottom: 16px; left: 50%; transform: translateX(-50%);
      border-radius: 12px; padding: 4px; display: flex; gap: 4px; }
    #subtab button { border: 0; background: transparent; cursor: pointer; font: 700 12px/1 Inter, system-ui;
      color: var(--muted); padding: 8px 14px; border-radius: 9px; display: inline-flex; align-items: center; gap: 7px;
      transition: color .15s; }
    #subtab button.on { background: rgba(255,255,255,0.9); color: var(--text); box-shadow: 0 1px 4px rgba(15,23,42,.12); }
    #subtab button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    /* ── Merge review: summary strip (reuses .glass) ── */
    #mergeSummary { position: absolute; z-index: 600; top: 16px; left: 60px; border-radius: 16px; padding: 10px 12px;
      display: none; }
    #mergeSummary.on { display: block; }
    #mergeSummary .thr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    #mergeSummary .thr .lab { font-size: 11px; font-weight: 700; color: var(--muted); }
    .thrseg { display: inline-flex; border-radius: 9px; padding: 3px; gap: 3px; background: rgba(15,23,42,.05); }
    .thrseg button { border: 0; background: transparent; cursor: pointer; font: 700 11px/1 Inter, system-ui;
      color: var(--muted); padding: 5px 10px; border-radius: 7px; transition: all .15s; }
    .thrseg button.on { background: var(--primary); color: #fff; }
    .thrseg button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    #mergeSummary .chip300 { font-size: 9.5px; font-weight: 700; color: var(--primary); background: var(--primarySoft);
      padding: 2px 6px; border-radius: 6px; }
    #mstiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    /* ── Merge review: list panel (reuses #buses geometry) ── */
    #mergePanel { position: absolute; z-index: 600; top: 16px; right: 16px; bottom: 16px; width: 320px;
      border-radius: 16px; display: none; flex-direction: column; overflow: hidden; }
    #mergePanel.on { display: flex; }
    #mergePanel .mhead { display: flex; align-items: center; justify-content: space-between; padding: 12px 12px 8px; }
    #mergePanel .mhead .ttl { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    #mergePanel .mhead .sub { font-size: 11px; color: var(--muted); }
    #mergeList { overflow-y: auto; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
    .mcard { position: relative; text-align: left; border-radius: 12px; padding: 9px 10px 9px 14px; cursor: pointer;
      background: rgba(255,255,255,0.55); border: 1.5px solid rgba(255,255,255,0.6); overflow: hidden;
      transition: box-shadow .12s, border-color .12s; width: 100%; flex: 0 0 auto; }
    .mcard:hover { border-color: rgba(99,102,241,.5); }
    .mcard.on { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primarySoft); background: var(--primarySoft); }
    .mcard:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .mcard .mbar { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
    .mcard .mtop { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .mcard .mname { font-size: 12.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .mbadge { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
    .mbadge.good { color: var(--good); background: rgba(16,185,129,.14); }
    .mbadge.watch { color: var(--watch); background: rgba(245,158,11,.16); }
    .mbadge.poor { color: var(--poor); background: rgba(244,63,94,.14); }
    .mcard .mrow { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); }
    .mcard .mrow b { color: var(--text); }
    .mcard .arrow { font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; }
    .mcard .only300 { font-size: 9px; font-weight: 800; color: var(--primary); background: var(--primarySoft); padding: 1px 5px; border-radius: 5px; }
    .mmembers { margin-top: 8px; padding-top: 7px; border-top: 1px dashed rgba(15,23,42,.14); display: flex; flex-direction: column; gap: 5px; }
    .mstop { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .mstop .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .mstop .nm { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mstop .rd { color: var(--muted); font-variant-numeric: tabular-nums; }
    .mstop .db { font-size: 9.5px; font-weight: 700; padding: 1px 5px; border-radius: 5px; font-variant-numeric: tabular-nums; }
    .mempty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 8px; }
  </style>
</head>
<body>
  <div id="cockpit">
    <div id="map"></div>

    <!-- Rebuild overlay: on load, the map refreshes routes from the live ERP (~5 min) -->
    <div id="loader">
      <div class="card glass">
        <svg class="route" viewBox="0 0 120 120" fill="none">
          <path id="rtTrack" class="track" stroke-width="5" d="M16 100 C 44 100, 40 62, 62 60 S 92 38, 104 20" />
          <path class="draw" stroke-width="5" d="M16 100 C 44 100, 40 62, 62 60 S 92 38, 104 20" />
          <circle cx="16" cy="100" r="6" fill="var(--primary)" />
          <circle cx="104" cy="20" r="6" fill="#8b5cf6" />
          <circle r="5" fill="#0f172a" stroke="#fff" stroke-width="2">
            <animateMotion dur="2.1s" repeatCount="indefinite" calcMode="linear"><mpath href="#rtTrack" /></animateMotion>
          </circle>
        </svg>
        <div class="ttl">Refreshing from live ERP</div>
        <div class="msg" id="loaderMsg">Contacting ERP…</div>
        <div class="bar"><i id="loaderBar"></i></div>
        <div class="hint2">Recomputing today's routes &amp; stops · this can take a few minutes</div>
      </div>
    </div>

    <!-- Fullscreen + Export stacked at the bottom-left, clear of the KPI strip -->
    <button class="gbtn glass" id="full" style="bottom:16px;left:16px"></button>
    <button class="gbtn glass" id="export" style="bottom:56px;left:16px"></button>

    <!-- restore chips when panels are hidden -->
    <button class="gbtn glass" id="showKpi" style="top:60px;left:60px;display:none"></button>
    <button class="gbtn glass" id="showBuses" style="top:16px;right:16px;display:none"></button>

    <!-- KPI glass strip -->
    <div id="kpi" class="glass">
      <div class="hint"><span id="hicon"></span><span id="hinttext">Click a stop to edit it or see its employees, or click a bus to trace its route.</span>
        <span class="eye icobtn" id="hideKpi" title="Hide stats"></span></div>
      <div id="tiles"></div>
    </div>

    <!-- YOUR BUSES glass panel -->
    <div id="buses" class="glass">
      <div class="bhead"><span class="ttl">Your buses</span>
        <span class="rt"><span id="buscount"></span><button class="icobtn" id="hideBuses" title="Hide"></button></span></div>
      <input class="search" id="search" placeholder="Find a bus…" />
      <div id="buslist"></div>
    </div>

    <!-- Sub-tab toggle: Route map vs Merge review -->
    <div id="subtab" class="glass">
      <button id="tabMap" class="on" aria-pressed="true">Route map</button>
      <button id="tabMerge" aria-pressed="false">Merge review</button>
    </div>

    <!-- Merge review: summary strip -->
    <div id="mergeSummary" class="glass">
      <div class="thr">
        <span class="lab">Merge within</span>
        <span class="thrseg" role="group" aria-label="Merge distance threshold">
          <button id="thr200" class="on" aria-pressed="true">200 m</button>
          <button id="thr300" aria-pressed="false">300 m</button>
        </span>
        <span class="chip300" id="thrNote"></span>
      </div>
      <div id="mstiles"></div>
    </div>

    <!-- Merge review: list panel -->
    <div id="mergePanel" class="glass">
      <div class="mhead"><span class="ttl">Merge review</span><span class="sub" id="mergeCount"></span></div>
      <div id="mergeList"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const DEPOT = [10.207550, 77.806206];
    const PAL = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16',
      '#06b6d4','#a855f7','#e11d48','#22c55e','#eab308','#3b82f6','#d946ef','#0891b2','#65a30d','#dc2626'];
    const EKEY = 'erpRouteEdits';
    const edits = JSON.parse(localStorage.getItem(EKEY) || '{}');
    const map = L.map('map', { zoomControl: true }).setView(DEPOT, 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

    function stopDot(color, hc, on) {
      const size = on ? 30 : 22, ring = on ? `box-shadow:0 0 0 3px #fff,0 0 0 5px ${color};` : 'box-shadow:0 1px 3px rgba(0,0,0,.35);';
      return L.divIcon({ className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2],
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;${ring}display:flex;align-items:center;justify-content:center;color:#fff;font:700 ${on ? 12 : 10}px/1 Inter,system-ui">${hc}</div>` });
    }
    function factoryPin() {
      return L.divIcon({ className: '', iconSize: [40, 50], iconAnchor: [20, 50],
        html: '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="50" viewBox="0 0 46 58"><path d="M23 57 C12 41 2.5 33.5 2.5 21 A20.5 20.5 0 1 1 43.5 21 C43.5 33.5 34 41 23 57 Z" fill="#0f172a" stroke="#fff" stroke-width="2.5"/><g transform="translate(11 9)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></g></svg>' });
    }
    function makeCluster(cluster) {
      const total = cluster.getAllChildMarkers().reduce((s, m) => s + (m.options.headcount || 0), 0);
      const size = total < 25 ? 36 : total < 100 ? 44 : total < 300 ? 52 : 62, fs = total >= 1000 ? 11 : total >= 100 ? 12.5 : 13.5;
      return L.divIcon({ className: '', iconSize: [size, size],
        html: `<div style="width:${size}px;height:${size}px;position:relative"><div style="position:absolute;inset:0;border-radius:50%;background:#6366f1;opacity:.2"></div><div style="position:absolute;inset:7px;border-radius:50%;background:#6366f1;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:700 ${fs}px/1 Inter,system-ui">${total}</div></div>` });
    }
    const cluster = L.markerClusterGroup({ showCoverageOnHover: false, maxClusterRadius: 60, iconCreateFunction: makeCluster }).addTo(map);
    const polyLayer = L.layerGroup().addTo(map);
    const stopLayer = L.layerGroup().addTo(map); // selected route: every stop shown individually (no clustering)
    L.marker(DEPOT, { icon: factoryPin(), zIndexOffset: 1000 }).bindTooltip('FACTORY (depot)', { direction: 'top', offset: [0, -44] }).addTo(map);

    let buses = [], sel = [], q = '';
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const editId = (bn, s) => `${bn}|${s.lat},${s.lng}`;
    const utilOf = b => b.seat ? (b.riders / b.seat) * 100 : 0;
    const pct = n => Math.round(n) + '%';
    const fillCol = u => u > 150 ? 'var(--watch)' : u >= 90 ? 'var(--good)' : u >= 60 ? 'var(--watch)' : 'var(--poor)';
    // lucide-style inline icons (matches the Optimiser/Planner tab — no emojis)
    const IC = {
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
      max: '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/>',
      min: '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/>',
      eyeoff: '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>',
      bar: '<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
      bus: '<path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.8-1.7.8-2.8c0-1-.3-2-.8-2.9l-1.9-4.6A2 2 0 0 0 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/>',
      pointer: '<path d="m9 9 5 12 1.8-5.2L21 14Z"/><path d="M7.2 2.2 8 5.1"/><path d="m5.1 8-2.9-.8"/><path d="M14 4.1 12 6"/><path d="m6 12-1.9 2"/>',
      chevR: '<path d="m9 18 6-6-6-6"/>', chevD: '<path d="m6 9 6 6 6-6"/>',
      check: '<path d="M20 6 9 17l-5-5"/>',
      alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
      merge: '<path d="m8 6 4-4 4 4"/><path d="M12 2v10.3a4 4 0 0 1-1.17 2.83L8 18"/><path d="m20 18-2-2"/><path d="M18 12h.01"/>',
    };
    const svg = (n, s = 14) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;vertical-align:-2px">${IC[n]}</svg>`;

    /* ── loader controls ── */
    const loaderEl = document.getElementById('loader');
    const showLoader = () => loaderEl.classList.add('on');
    const hideLoader = () => loaderEl.classList.remove('on');
    const setLoader = (msg, pct) => {
      if (msg != null) document.getElementById('loaderMsg').textContent = msg;
      if (pct != null) document.getElementById('loaderBar').style.width = Math.max(0, Math.min(100, pct)) + '%';
    };
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function loadRoutesFile() {
      const bust = '?t=' + Date.now(); // bypass any cache so we read the freshly-built file
      let d;
      try { const r = await fetch('/current_routes.full.json' + bust); if (r.ok) d = await r.json(); } catch (e) {}
      if (!d) d = await (await fetch('/current_routes.json' + bust)).json();
      return d;
    }

    /* Ask the dev server to rebuild from the live ERP, showing progress. Silently no-ops
       (falls back to the saved snapshot) when the endpoint is absent — e.g. on Vercel. */
    async function rebuildFromLiveERP() {
      showLoader(); setLoader('Contacting ERP…', 0);
      let running = false;
      try {
        const res = await fetch('/__rebuild_routes', { method: 'POST' });
        running = res.ok && (res.headers.get('content-type') || '').includes('json');
        if (running) { const j = await res.json(); setLoader(j.message, j.pct); running = j.status === 'running'; }
      } catch (e) { running = false; }
      if (!running) { hideLoader(); return; } // no live rebuild here → use the committed snapshot
      while (true) {
        await sleep(1500);
        let st;
        try { st = await (await fetch('/__rebuild_status')).json(); } catch (e) { break; }
        setLoader(st.message, st.pct);
        if (st.status === 'done') { setLoader('Routes updated', 100); await sleep(450); break; }
        if (st.status === 'error') { await sleep(900); break; }
        if (st.status === 'idle') break;
      }
    }

    (async () => {
      await rebuildFromLiveERP();
      const d = await loadRoutesFile();
      hideLoader();
      buses = d.buses;
      buses.forEach(b => b.stops.forEach(s => { const e = edits[editId(b.name, s)]; if (e) { if (e.name != null) s.name = e.name; if (e.hc != null) s.hc = e.hc; } }));
      const owned = buses.filter(b => b.type !== 'rental').length, seats = buses.reduce((s, b) => s + (b.seat || 0), 0);
      document.getElementById('tiles').innerHTML = [
        ['Buses', d.meta.vehicles, `${owned} own · ${d.meta.vehicles - owned} rent`, 'var(--primary)'],
        ['Riders', d.meta.riders.toLocaleString(), `${d.meta.riders_placed.toLocaleString()} placed`, 'var(--good)'],
        ['Utilisation', pct(seats ? d.meta.riders / seats * 100 : 0), `${seats.toLocaleString()} seats`, 'var(--watch)'],
        ['Stops', d.meta.stops.toLocaleString(), `${(d.meta.stops / d.meta.vehicles).toFixed(0)} avg/bus`, 'var(--gainup)'],
      ].map(([l, v, s, c]) => `<div class="tile"><span class="bar" style="background:${c}"></span><div class="lab">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`).join('');

      buses.forEach((b, bi) => {
        const col = PAL[bi % PAL.length]; b._col = col;
        b._poly = (b.path && b.path.length > 1) ? b.path : [DEPOT, ...b.stops.map(s => [s.lat, s.lng])];
        b.stops.forEach((s, si) => {
          const mk = L.marker([s.lat, s.lng], { icon: stopDot(col, s.hc, false), headcount: s.hc });
          mk.bindTooltip(`<div style="font:600 12px/1.35 Inter,system-ui"><b>${esc(s.name)}</b><br><span style="color:${col};font-weight:700">${esc(b.name)}</span> · ${s.hc} riders</div>`, { direction: 'top', offset: [0, -12] });
          mk.bindPopup(() => popupHtml(bi, si));
          s._marker = mk; s._col = col;
        });
      });
      renderBuses(); applyMap();
    })();

    function renderBuses() {
      let list = buses.map((b, i) => ({ b, i })).filter(x => !q || x.b.name.toLowerCase().includes(q) || (x.b.unit || '').toLowerCase().includes(q));
      list.sort((a, b) => (sel.includes(b.i) - sel.includes(a.i)) || (b.b.n_stops - a.b.n_stops));
      const used = buses.filter(b => b.n_stops > 0).length;
      document.getElementById('buscount').textContent = (sel.length ? sel.length + ' sel · ' : '') + `${used}/${buses.length}`;
      document.getElementById('buslist').innerHTML = list.map(({ b, i }) => {
        const u = utilOf(b), on = sel.includes(i);
        return `<button class="bcard ${on ? 'on' : ''}" onclick="toggleBus(${i})" title="${esc(b.name)} — ${b.n_stops} stops, ${b.km || '?'} km, ${b.trip || '?'} min">
          <div class="bhdr"><span class="bdot" style="background:${b._col}"></span><span class="bnm">${esc(b.name)}</span></div>
          <div class="track"><div class="fill" style="width:${Math.min(100, u)}%;background:${fillCol(u)}"></div></div>
          <div class="brow"><span>${b.type === 'rental' ? 'rent' : 'own'} · ${b.seat || '?'}</span><span class="num">${b.riders}/${b.seat || '?'}</span></div>
        </button>`;
      }).join('');
      document.getElementById('export').innerHTML = svg('download') + (sel.length ? ` Export (${sel.length})` : ' Export');
    }
    function toggleBus(i) {
      // single-select like the Planner: clicking a bus shows ONLY that route; click it again to clear
      sel = (sel.length === 1 && sel[0] === i) ? [] : [i];
      applyMap(); renderBuses();
    }
    function applyMap() {
      cluster.clearLayers(); polyLayer.clearLayers(); stopLayer.clearLayers();
      if (sel.length) {
        // selected route(s): draw every ERP stop individually — no merging, exactly as it exists
        sel.forEach(i => buses[i].stops.forEach(s => { if (s._marker) s._marker.addTo(stopLayer); }));
        sel.forEach(i => { const b = buses[i]; if (b._poly && b._poly.length > 1) L.polyline(b._poly, { color: b._col, weight: 4, opacity: .95 }).addTo(polyLayer); });
        const pts = sel.flatMap(i => [DEPOT, ...buses[i].stops.map(s => [s.lat, s.lng])]);
        if (pts.length > 1) map.fitBounds(pts, { padding: [60, 60] });
      } else {
        // overview (no bus selected): cluster all stops just so the region isn't a wall of pins
        const batch = [];
        buses.forEach(b => b.stops.forEach(s => { if (s._marker) batch.push(s._marker); }));
        cluster.addLayers(batch);
      }
    }

    /* stop popup: edit + collapsible employees */
    function popupHtml(bi, si) {
      const b = buses[bi], s = b.stops[si];
      return `<div class="pop"><div style="font-size:11px;color:#64748b">Bus <b>${esc(b.name)}</b> · stop ${s.order} of ${b.n_stops}</div>
        <label>Stop name</label><input id="ed-name" value="${esc(s.name)}" />
        <label>Headcount</label><input id="ed-hc" type="number" min="0" value="${s.hc}" />
        <button class="save" onclick="saveStop(${bi},${si})">Save</button>
        <button class="see" id="see-btn" onclick="toggleEmps(${bi},${si})">${svg('chevR', 12)} See employees (${s.hc})</button>
        <div class="emps" id="emp-list"></div></div>`;
    }
    function toggleEmps(bi, si) {
      const s = buses[bi].stops[si], el = document.getElementById('emp-list'), btn = document.getElementById('see-btn');
      if (el.innerHTML) { el.innerHTML = ''; btn.innerHTML = svg('chevR', 12) + ` See employees (${s.hc})`; return; }
      if (s.members && s.members.length) el.innerHTML = s.members.map(m => `<div><b>${esc(m.name || '—')}</b>${m.village ? ' · <span style="color:#64748b">' + esc(m.village) + '</span>' : ''}</div>`).join('');
      else el.innerHTML = `<div style="color:#64748b">${s.hc} employee(s) mapped here · names hidden on the public link</div>`;
      btn.innerHTML = svg('chevD', 12) + ` Hide employees (${s.hc})`;
    }
    function saveStop(bi, si) {
      const b = buses[bi], s = b.stops[si];
      const nm = document.getElementById('ed-name').value.trim(), hc = Math.max(0, parseInt(document.getElementById('ed-hc').value) || 0);
      s.name = nm || s.name; s.hc = hc;
      edits[editId(b.name, s)] = { name: s.name, hc: s.hc }; localStorage.setItem(EKEY, JSON.stringify(edits));
      if (s._marker) { s._marker.setIcon(stopDot(s._col, hc, false)); s._marker.options.headcount = hc; s._marker.setPopupContent(popupHtml(bi, si)); if (cluster.refreshClusters) cluster.refreshClusters(s._marker); }
    }

    /* export (selection-aware) */
    function exportXlsx() {
      const use = sel.length ? sel.map(i => buses[i]) : buses;
      const hasNames = buses.some(b => b.stops.some(s => s.members && s.members.length));
      const rows = [], header = hasNames ? ['Stop','Latitude','Longitude','Bus','Headcount','Village','Employee'] : ['Stop','Latitude','Longitude','Bus','Headcount'];
      if (hasNames) use.forEach(b => b.stops.forEach(s => (s.members || []).forEach(m => rows.push({ Stop: s.name, Latitude: s.lat, Longitude: s.lng, Bus: b.name, Headcount: s.hc, Village: m.village || '', Employee: m.name || '' }))));
      else use.forEach(b => b.stops.forEach(s => rows.push({ Stop: s.name, Latitude: s.lat, Longitude: s.lng, Bus: b.name, Headcount: s.hc })));
      const ws = XLSX.utils.json_to_sheet(rows, { header });
      ws['!cols'] = header.map(h => ({ wch: h === 'Employee' ? 24 : h === 'Stop' || h === 'Village' ? 20 : 12 }));
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Stops'); XLSX.writeFile(wb, 'previously_used_routes.xlsx');
    }

    /* controls: fullscreen, panel toggles, search, export */
    // set lucide icons (no emojis)
    document.getElementById('full').innerHTML = svg('max') + ' Fullscreen';
    document.getElementById('showKpi').innerHTML = svg('bar') + ' Stats';
    document.getElementById('showBuses').innerHTML = svg('bus') + ' Buses';
    document.getElementById('hideKpi').innerHTML = svg('eyeoff');
    document.getElementById('hideBuses').innerHTML = svg('eyeoff');
    document.getElementById('hicon').innerHTML = svg('pointer', 13);

    document.getElementById('search').oninput = e => { q = e.target.value.trim().toLowerCase(); renderBuses(); };
    document.getElementById('export').onclick = exportXlsx;
    const cockpit = document.getElementById('cockpit');
    document.getElementById('full').onclick = () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else cockpit.requestFullscreen && cockpit.requestFullscreen();
    };
    document.addEventListener('fullscreenchange', () => {
      const b = document.getElementById('full'); b.innerHTML = document.fullscreenElement ? svg('min') + ' Exit fullscreen' : svg('max') + ' Fullscreen';
      setTimeout(() => map.invalidateSize(), 60);
    });
    const kpi = document.getElementById('kpi'), busesPanel = document.getElementById('buses');
    const relayoutKpi = () => { kpi.style.right = (busesPanel.style.display === 'none' ? 16 : 332) + 'px'; };
    document.getElementById('hideKpi').onclick = () => { kpi.style.display = 'none'; document.getElementById('showKpi').style.display = 'inline-flex'; };
    document.getElementById('showKpi').onclick = () => { kpi.style.display = 'block'; document.getElementById('showKpi').style.display = 'none'; };
    document.getElementById('hideBuses').onclick = () => { busesPanel.style.display = 'none'; document.getElementById('showBuses').style.display = 'inline-flex'; relayoutKpi(); };
    document.getElementById('showBuses').onclick = () => { busesPanel.style.display = 'flex'; document.getElementById('showBuses').style.display = 'none'; relayoutKpi(); };
    relayoutKpi();
    setTimeout(() => map.invalidateSize(), 80);

    /* ============================ MERGE REVIEW SUB-TAB ============================ */
    const reduceMo = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
    const BAND = { good: 150, watch: 250 };                 // absolute walk-distance bands (constant across thresholds)
    const bandOf = d => d <= BAND.good ? 'good' : d <= BAND.watch ? 'watch' : 'poor';
    const bandCol = b => b === 'good' ? 'var(--good)' : b === 'watch' ? 'var(--watch)' : 'var(--poor)';
    const bandHex = b => b === 'good' ? '#10b981' : b === 'watch' ? '#f59e0b' : '#f43f5e';
    const gidOf = it => it.bus + '|' + it.group;

    let MERGE = null, thr = '200', selMerge = null, mgView = false;
    const mergeTargets = L.layerGroup(), mergeMembers = L.layerGroup(), mergeLines = L.layerGroup();
    const targetMarkers = {};

    const only300Set = () => {
      const at200 = new Set((MERGE.thresholds['200'].items || []).map(gidOf));
      return new Set((MERGE.thresholds['300'].items || []).filter(it => !at200.has(gidOf(it))).map(gidOf));
    };
    const curItems = () => (MERGE.thresholds[thr].items || []).slice().sort((a, b) => b.farthest - a.farthest); // riskiest first
    const itemByGid = gid => (MERGE.thresholds[thr].items || []).find(it => gidOf(it) === gid);

    function renderMergeSummary() {
      const T = MERGE.thresholds[thr], bands = { good: 0, watch: 0, poor: 0 };
      (T.items || []).forEach(it => bands[bandOf(it.farthest)]++);
      const tile = (l, v, s, c) => `<div class="tile"><span class="bar" style="background:${c}"></span><div class="lab">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`;
      document.getElementById('mstiles').innerHTML = [
        tile('Merge groups', T.groups, `${T.stops_merged_away} stops merged`, 'var(--primary)'),
        tile('Riders moved', T.riders_moved.toLocaleString(), 'to a nearer stop', 'var(--gainup)'),
        tile('Stops after', T.remaining.toLocaleString(), `from ${MERGE.meta.stops_asis.toLocaleString()}`, 'var(--good)'),
        tile('Needs review', bands.poor, `${bands.good} safe · ${bands.watch} border`, bands.poor ? 'var(--poor)' : 'var(--good)'),
      ].join('');
      document.getElementById('thrNote').textContent =
        thr === '300' ? `+${MERGE.thresholds['300'].groups - MERGE.thresholds['200'].groups} more than 200 m` : '';
    }

    const badge = d => { const b = bandOf(d); return `<span class="mbadge ${b}">${svg(b === 'good' ? 'check' : 'alert', 11)}${d} m</span>`; };

    function renderMergeList() {
      const items = curItems(), only3 = thr === '300' ? only300Set() : new Set();
      if (selMerge && !items.some(it => gidOf(it) === selMerge)) selMerge = null;
      document.getElementById('mergeCount').textContent = `${items.length} groups · riskiest first`;
      const list = document.getElementById('mergeList');
      list.innerHTML = items.map(it => {
        const gid = gidOf(it), b = bandOf(it.farthest), riders = it.merged.reduce((s, m) => s + m.riders, 0), isNew = only3.has(gid);
        const lab = b === 'good' ? 'safe' : b === 'watch' ? 'borderline' : 'risky';
        return `<button class="mcard${gid === selMerge ? ' on' : ''}" data-gid="${esc(gid)}" aria-label="Merge into ${esc(it.target.name)}: ${it.merged.length} stops merging in, farthest walk ${it.farthest} metres, ${lab}">
          <span class="mbar" style="background:${bandCol(b)}"></span>
          <div class="mtop"><span class="mname">${esc(it.target.name)}</span>${isNew ? '<span class="only300">300 m only</span>' : ''}${badge(it.farthest)}</div>
          <div class="mrow"><span>keeps <b>${it.target.riders}</b> · +<b>${it.merged.length} stop${it.merged.length > 1 ? 's' : ''}</b> (${riders} riders)</span><span class="arrow">${it.target.riders} → ${it.combined}</span></div>
        </button>`;
      }).join('') || '<div class="mempty">No merges at this threshold.</div>';
      list.querySelectorAll('.mcard').forEach(el => {
        const gid = el.getAttribute('data-gid');
        el.addEventListener('click', () => selectMerge(gid === selMerge ? null : gid));
        el.addEventListener('mouseenter', () => pulseGroup(gid));
      });
      if (selMerge) selectMerge(selMerge, true);   // keep expansion after re-render
      renderMergeMap();
    }

    function renderMergeMap() {
      mergeTargets.clearLayers(); mergeMembers.clearLayers(); mergeLines.clearLayers();
      for (const k in targetMarkers) delete targetMarkers[k];
      curItems().forEach(it => {
        const gid = gidOf(it), col = bandHex(bandOf(it.farthest)), on = gid === selMerge, sz = on ? 16 : 12;
        const mk = L.marker([it.target.lat, it.target.lng], {
          icon: L.divIcon({ className: '', iconSize: [sz, sz], iconAnchor: [sz / 2, sz / 2],
            html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:2px solid #fff;box-shadow:0 0 0 ${on ? 3 : 0}px ${col}55,0 1px 3px rgba(0,0,0,.35)"></div>` }),
          zIndexOffset: on ? 1000 : 0,
        }).bindTooltip(`<b>${esc(it.target.name)}</b> · keeps ${it.target.riders} → ${it.combined}`, { direction: 'top', offset: [0, -8] });
        mk.on('click', () => selectMerge(gid === selMerge ? null : gid));
        mk.addTo(mergeTargets); targetMarkers[gid] = mk;
      });
      const sel = selMerge && itemByGid(selMerge);
      if (sel) {
        const tp = [sel.target.lat, sel.target.lng], lines = [];
        sel.merged.forEach(m => {
          const col = bandHex(bandOf(m.dist));
          L.marker([m.lat, m.lng], { icon: L.divIcon({ className: '', iconSize: [13, 13], iconAnchor: [6.5, 6.5],
            html: `<div style="width:13px;height:13px;border-radius:50%;background:#fff;border:2.5px solid ${col};box-shadow:0 1px 2px rgba(0,0,0,.3)"></div>` }) })
            .bindTooltip(`${esc(m.name)} · ${m.riders} riders · ${m.dist} m walk`, { direction: 'top', offset: [0, -8] }).addTo(mergeMembers);
          lines.push(L.polyline([[m.lat, m.lng], tp], { color: col, weight: 2.5, opacity: .9, dashArray: '6 6' }).addTo(mergeLines));
        });
        if (!reduceMo && window.gsap) requestAnimationFrame(() => lines.forEach((pl, i) => {
          const el = pl.getElement(); if (!el || !el.getTotalLength) return;
          const len = el.getTotalLength();
          gsap.fromTo(el, { strokeDasharray: len, strokeDashoffset: len },
            { strokeDashoffset: 0, duration: .5, delay: i * 0.05, ease: 'power2.out',
              onComplete: () => { el.style.strokeDasharray = '6 6'; el.style.strokeDashoffset = '0'; } });
        }));
        map.fitBounds([tp, ...sel.merged.map(m => [m.lat, m.lng])], { padding: [80, 80], maxZoom: 15 });
      }
    }

    function pulseGroup(gid) {
      const mk = targetMarkers[gid]; if (!mk || reduceMo || !window.gsap) return;
      const el = mk.getElement(); if (!el) return;
      gsap.fromTo(el, { scale: 1 }, { scale: 1.4, duration: .18, yoyo: true, repeat: 1, ease: 'power1.inOut', transformOrigin: 'center' });
    }

    function selectMerge(gid, keep) {
      selMerge = gid;
      document.querySelectorAll('.mcard').forEach(el => {
        const on = el.getAttribute('data-gid') === gid;
        el.classList.toggle('on', on);
        let mm = el.querySelector('.mmembers');
        if (on) {
          if (!mm) {
            const it = itemByGid(gid);
            mm = document.createElement('div'); mm.className = 'mmembers';
            mm.innerHTML = it.merged.map(m => { const b = bandOf(m.dist);
              return `<div class="mstop"><span class="dot" style="background:${bandCol(b)}"></span><span class="nm">${esc(m.name)}</span><span class="rd">${m.riders} rider${m.riders > 1 ? 's' : ''}</span><span class="db mbadge ${b}">${m.dist} m</span></div>`; }).join('');
            el.appendChild(mm);
            if (!reduceMo && window.gsap) gsap.from(mm.children, { autoAlpha: 0, y: -4, duration: .28, stagger: .04, ease: 'power2.out' });
          }
          if (!keep) el.scrollIntoView({ block: 'nearest', behavior: reduceMo ? 'auto' : 'smooth' });
        } else if (mm) { mm.remove(); }
      });
      if (!keep) renderMergeMap();
    }

    async function loadMerge() {
      try {
        const r = await fetch('/merge_suggestions.json?t=' + Date.now());
        if (!r.ok) throw 0;
        MERGE = await r.json();
        if (mgView) { renderMergeSummary(); renderMergeList(); }
      } catch (e) {
        document.getElementById('mergeList').innerHTML = '<div class="mempty">Merge suggestions not available yet.<br>They refresh when the route rebuild runs.</div>';
      }
    }

    function setThr(t) {
      thr = t; selMerge = null;
      ['200', '300'].forEach(x => { const b = document.getElementById('thr' + x); b.classList.toggle('on', x === t); b.setAttribute('aria-pressed', String(x === t)); });
      renderMergeSummary(); renderMergeList();
    }

    function setMergeView(on) {
      mgView = on;
      ['tabMap', 'tabMerge'].forEach(id => { const b = document.getElementById(id); const sel = (id === 'tabMerge') === on; b.classList.toggle('on', sel); b.setAttribute('aria-pressed', String(sel)); });
      document.getElementById('mergeSummary').classList.toggle('on', on);
      document.getElementById('mergePanel').classList.toggle('on', on);
      ['kpi', 'buses'].forEach(id => document.getElementById(id).style.display = on ? 'none' : (id === 'buses' ? 'flex' : 'block'));
      ['showKpi', 'showBuses'].forEach(id => document.getElementById(id).style.display = 'none');
      if (on) {
        cluster.remove(); polyLayer.remove(); stopLayer.remove();
        mergeTargets.addTo(map); mergeMembers.addTo(map); mergeLines.addTo(map);
        if (MERGE) { renderMergeSummary(); renderMergeList(); } else { document.getElementById('mergeList').innerHTML = '<div class="mempty">Loading…</div>'; loadMerge(); }
        if (!reduceMo && window.gsap) gsap.from('#mergePanel .mcard', { autoAlpha: 0, y: 10, duration: .35, stagger: .03, ease: 'power2.out' });
      } else {
        mergeTargets.remove(); mergeMembers.remove(); mergeLines.remove();
        cluster.addTo(map); polyLayer.addTo(map); stopLayer.addTo(map);
      }
      setTimeout(() => map.invalidateSize(), 60);
    }

    document.getElementById('tabMap').onclick = () => setMergeView(false);
    document.getElementById('tabMerge').onclick = () => setMergeView(true);
    document.getElementById('thr200').onclick = () => setThr('200');
    document.getElementById('thr300').onclick = () => setThr('300');
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && selMerge) selectMerge(null); });
    loadMerge(); // preload so the first switch is instant
  </script>
</body>
</html>
